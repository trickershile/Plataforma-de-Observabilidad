---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lakehouse-observabilidad-deployment
  namespace: observabilidad
  labels:
    app: lakehouse-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: lakehouse-app
  template:
    metadata:
      labels:
        app: lakehouse-app
    spec:
      containers:
        - name: orquestador-datos
          image: your-dockerhub-user/plataforma-observabilidad-lakehouse:latest
          ports:
            - containerPort: 8501
              name: http
            - containerPort: 4040
              name: spark-ui
            - containerPort: 8888
              name: jupyter
          resources:
            limits:
              cpu: "1000m"
              memory: "1Gi"
            requests:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: LOG_FILE_PATH
              value: "/app/alertas.log"
            - name: LAKEHOUSE_PATH
              value: "/app/lakehouse"
          startupProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: lakehouse-observabilidad-service
  namespace: observabilidad
  labels:
    app: lakehouse-app
spec:
  selector:
    app: lakehouse-app
  ports:
    - name: http
      port: 8501
      targetPort: 8501
    - name: spark-ui
      port: 4040
      targetPort: 4040
  type: ClusterIP

name: Plataforma Observabilidad - Data Pipeline CI/CD

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  data-qa-security:
    name: Validaciones de Datos, Calidad y Seguridad
    runs-on: ubuntu-latest
    
    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Configurar Entorno Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Dependencias
      run: |
        pip install -r requirements.txt
        pip install pytest flake8

    - name: Ejecutar Análisis de Calidad de Código (Flake8 IE5)
      run: |
        # Garantiza políticas de cumplimiento antes del despliegue (IE5)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Ejecutar Pruebas Unitarias (Pytest IE7)
      run: |
        # Batería de pruebas automatizadas para validar estabilidad del código (IE7)
        python -m pytest tests/ -v --tb=short

    - name: Escaneo de Vulnerabilidades (Snyk IE6)
      uses: snyk/actions/python@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        command: monitor

    - name: Análisis Estático con SonarQube (IE5/IE6)
      uses: sonarsource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  deploy-lakehouse:
    name: Despliegue de Infraestructura Cloud Simulada
    needs: data-qa-security
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest

    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v3

    - name: Autenticar en Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Construir y Publicar Contenedor (Orquestador/Planta IE1)
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-observabilidad-lakehouse:latest

    - name: Despliegue Automatizado en Kubernetes Clúster (IE2/IE4)
      run: |
        echo "Aplicando configuraciones de monitoreo y observabilidad para las capas Bronze, Silver y Gold..."
        echo "Orquestando Pods del Lakehouse y dashboards..."
        echo "Despliegue finalizado con trazabilidad completa."
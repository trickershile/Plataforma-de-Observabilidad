name: Plataforma Observabilidad - Data Pipeline CI/CD

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["main"]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-observabilidad-lakehouse

jobs:
  data-qa-security:
    name: Validaciones de Datos, Calidad y Seguridad
    runs-on: ubuntu-latest

    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configurar Entorno Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar Dependencias
      run: |
        pip install -r requirements.txt
        pip install pytest flake8

    - name: Ejecutar Análisis de Calidad de Código (Flake8)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 notebooks/ --count --max-complexity=10 --statistics

    - name: Ejecutar Pruebas Unitarias (Pytest)
      run: |
        python -m pytest tests/ -v --tb=short

    - name: Escaneo de Vulnerabilidades (Snyk)
      uses: snyk/actions/python@v1.0.0
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        command: test
      continue-on-error: false

    - name: Análisis Estático con SonarQube
      uses: sonarsource/sonarqube-scan-action@v2.0.2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        args: >
          -Dsonar.qualitygate.wait=true
          -Dsonar.qualitygate.timeout=300

  build-and-push:
    name: Construir y Publicar Imagen Docker
    needs: data-qa-security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v4

    - name: Autenticar en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Construir y Publicar Contenedor
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ env.DOCKER_IMAGE }}:latest
          ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  deploy-lakehouse:
    name: Despliegue en Kubernetes
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v4

    - name: Configurar kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'

    - name: Desplegar en Kubernetes
      run: |
        sed -i "s|image:.*|image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}|" k8s/deployment.yml
        kubectl apply -f k8s/deployment.yml
        kubectl apply -f k8s/istio-telemetry.yml
        kubectl rollout status deployment/lakehouse-observabilidad-deployment --timeout=300s
